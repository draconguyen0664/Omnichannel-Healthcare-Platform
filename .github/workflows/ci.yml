name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  web-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Web Admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: npm
          cache-dependency-path: Web Admin/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  patient-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Patient App
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: npm
          cache-dependency-path: Patient App/package-lock.json
      - run: npm ci
      - run: npm run typecheck

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "23"
          cache: maven
      - run: ./mvnw clean test

  doctor-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Doctor App
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze
      - run: flutter test

  service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: Service/go.mod
      - run: go mod tidy
      - run: go vet ./...
      - run: go test ./...

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        working-directory: Infrastructure
        run: cp .env.example .env && docker compose config --quiet
      - name: Validate Kubernetes manifests
        uses: azure/setup-kubectl@v4
        with:
          version: latest
      - run: kubectl kustomize Infrastructure/kubernetes/base > /dev/null

  sentry-release:
    if: github.event_name == 'push' && vars.SENTRY_ENABLED == 'true'
    needs: [web-admin, patient-app, doctor-app, backend, service, infrastructure]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
