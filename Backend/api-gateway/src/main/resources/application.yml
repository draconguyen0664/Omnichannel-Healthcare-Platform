spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: ${PATIENT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/patients/**

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
