services:
  api-gateway:
    build: ./api-gateway
    environment:
      PATIENT_SERVICE_URL: http://patient-service:8081
    ports:
      - "8080:8080"
    depends_on:
      patient-service:
        condition: service_healthy

  patient-service:
    build: ./services/patient-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/patient_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 161098long@
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: omni
      RABBITMQ_PASSWORD: omni_secret
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: patient_db
      MYSQL_ROOT_PASSWORD: 161098long@
    ports:
      - "3306:3306"
    volumes:
      - patient_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p161098long@"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: omni
      RABBITMQ_DEFAULT_PASS: omni_secret
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  patient_mysql_data:
