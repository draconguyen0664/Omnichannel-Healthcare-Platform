spring:
  application:
    name: patient-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/omni_health?createDatabaseIfNotExist=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:161098long@}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:omni}
    password: ${RABBITMQ_PASSWORD:omni_secret}
server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  security:
    username: ${APP_USERNAME:admin}
    password: ${APP_PASSWORD:change-me}
  messaging:
    patient-created-queue: patient.created
