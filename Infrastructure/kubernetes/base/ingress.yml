apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omni-health
  namespace: omni-health
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
    - host: api.omni-health.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port: { number: 8080 }
