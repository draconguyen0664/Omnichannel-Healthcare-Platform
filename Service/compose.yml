services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: omni_service
      POSTGRES_USER: omni
      POSTGRES_PASSWORD: omni_secret
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:8-alpine
    ports: ["6379:6379"]
  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: omni
      RABBITMQ_DEFAULT_PASS: omni_secret
    ports: ["5672:5672", "15672:15672"]

volumes:
  postgres_data:
